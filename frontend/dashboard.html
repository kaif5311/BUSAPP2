<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings - BusTicket</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">Bus<span>Ticket</span></a>
        <div class="nav-links">
            <span id="user-greeting" style="font-weight: 500;">Hello, User</span>
            <button class="btn btn-outline" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container" style="margin-top: 2rem;">
        <h2 style="margin-bottom: 2rem; color: var(--secondary-color);">My Bookings</h2>
        
        <div id="user-bookings-list">
            <!-- Bookings will be loaded here via JS -->
            <p>Loading your bookings...</p>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Check auth on load
        document.addEventListener('DOMContentLoaded', () => {
            if (!isAuthenticated()) {
                window.location.href = 'login.html';
                return;
            }
            loadUserBookings();
        });
    </script>
</body>
</html>
